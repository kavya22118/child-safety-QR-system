<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Safety QR System</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            text-align:center;
            padding:20px;
        }

        .container{
            max-width:500px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input,select{
            width:90%;
            padding:10px;
            margin:10px;
        }

        button{
            padding:10px 20px;
            background:green;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        #qrcode{
        margin-top:20px;
        display:flex;
        justify-content:center;
        border:1px solid black;
        min-height:220px;
        }

        #details{
            margin-top:20px;
            text-align:left;
        }
    </style>
</head>
<body>

<div class="container">

<h2>Smart Child Safety QR System</h2>

<input type="text" id="childName" placeholder="Child Name">

<input type="text" id="parentName" placeholder="Parent Name">

<input type="text" id="motherNumber" placeholder="Mother Phone Number">

<input type="text" id="fatherNumber" placeholder="Father Phone Number">

<input type="text" id="emergencyNumber" placeholder="Emergency Contact Number">

<input type="text" id="address" placeholder="Address">

<select id="language">
    <option value="English">English</option>
    <option value="Telugu">Telugu</option>
    <option value="Hindi">Hindi</option>
</select>

<button onclick="generateQR()">Generate QR</button>

<div id="qrcode"></div>

<div id="details"></div>

</div>

<script src="script.js"></script>

</body>
</html>
